name: CodeQL

on:
  push:
    branches: [main, master, "security/**"]
  pull_request:
    branches: [main, master, "security/**"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/autobuild@v3
      # SARIF upload fails until Code Scanning is enabled in repo Settings
      # (Security → Code security → Code scanning). Until then, the scan still
      # runs locally on the runner — we just can't surface findings on the
      # Security tab. continue-on-error keeps the PR mergeable.
      - uses: github/codeql-action/analyze@v3
        continue-on-error: true
